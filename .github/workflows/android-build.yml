name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger of the build from the GitHub UI

jobs:
  build:
    name: Build APK (Capacitor)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm Packages
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor Platforms
        run: |
          # If the android folder is not committed to git, create it
          if [ ! -d "android" ]; then
            echo "android folder not found, initializing Capacitor Android platform..."
            npx cap add android
          fi

      - name: Sync Web assets to Android Native
        run: npx cap sync android

      - name: Enable WebView debugging for debug builds
        run: |
          # Ensure android:debuggable="true" and WebView debugging in AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Add android:debuggable="true" to <application> if not present
            if ! grep -q 'android:debuggable="true"' "$MANIFEST"; then
              sed -i 's/<application/<application android:debuggable="true" /' "$MANIFEST"
            fi
            # Add android:usesCleartextTraffic="true" for allowCleartext
            if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
              sed -i 's/<application/<application android:usesCleartextTraffic="true" /' "$MANIFEST"
            fi
            echo "AndroidManifest.xml patched for debugging"
          fi

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Build Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Locate and Rename Built APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk build-output/Lumina-Calendar-debug.apk
          echo "APK successfully built and prepared!"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumina-Calendar-Android-APK
          path: build-output/Lumina-Calendar-debug.apk
          if-no-files-found: error
          retention-days: 14
